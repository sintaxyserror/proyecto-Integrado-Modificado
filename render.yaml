services:
  - type: web
    name: www
    plan: free
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: test
      - key: MYSQL_DATABASE
        value: Proyecto
      - key: DB_HOST
        value: db
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: test

  - type: pserv
    name: db
    plan: free
    image: mysql:latest
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: test
      - key: MYSQL_DATABASE
        value: Proyecto
