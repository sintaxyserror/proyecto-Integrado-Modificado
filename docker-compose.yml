version: "3.1"
services:
    db:
        image: postgres:15-alpine
        ports: 
            - "5432:5432"
        environment:
            POSTGRES_DB: Proyecto
            POSTGRES_USER: projectuser
            POSTGRES_PASSWORD: projectpass
        volumes:
            - ./codigo/inflaestructura/dump:/docker-entrypoint-initdb.d
            - persistent:/var/lib/postgresql/data
        networks:
            - default
    www:
        build: .
        ports: 
            - "8080:80"
        volumes:
            - ./codigo/inflaestructura/www:/var/www/html
        environment:
            DB_HOST: db
            DB_USER: projectuser
            DB_PASSWORD: projectpass
            DB_NAME: Proyecto
            DB_PORT: 5432
        links:
            - db
        networks:
            - default
    pgadmin:
        image: dpage/pgadmin4:latest
        ports:
            - "5050:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: admin
        networks:
            - default
        depends_on:
            - db
volumes:
    persistent:

